# ===================================================================
# nginx reverse proxy for Zelion Reactor webhook mode
# Place at /etc/nginx/sites-available/zelion and symlink to sites-enabled.
# Replace your-domain.com with your real domain.
# ===================================================================

# Redirect all HTTP to HTTPS.
server {
    listen 80;
    server_name your-domain.com;
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    server_name your-domain.com;

    # Certs issued by certbot (see DEPLOYMENT.md step "HTTPS").
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Telegram only sends POST updates to the webhook path.
    location /webhook {
        proxy_pass         http://127.0.0.1:8080/webhook;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Forward Telegram's secret header so aiogram can validate it.
        proxy_set_header   X-Telegram-Bot-Api-Secret-Token $http_x_telegram_bot_api_secret_token;
    }

    location / { return 404; }
}
