services:
  db:
    image: postgres:16-alpine
    container_name: zelion_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zelion}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zelion}
      POSTGRES_DB: ${POSTGRES_DB:-zelion}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zelion}"]
      interval: 5s
      timeout: 3s
      retries: 10
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  redis:
    image: redis:7-alpine
    container_name: zelion_redis
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  bot:
    build: .
    container_name: zelion_bot
    restart: always
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Only needed when USE_WEBHOOK=true (Telegram -> nginx -> this port).
    ports:
      - "${WEB_PORT:-8080}:8080"
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

volumes:
  pgdata:
  redisdata:
